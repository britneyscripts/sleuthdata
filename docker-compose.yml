version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: job_crawler_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: job_crawler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: job_crawler_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: job_crawler_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_secure_pass@postgres:5432/job_crawler
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: job_crawler_worker
    command: rq worker job_crawler --url redis://redis:6379/0
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_secure_pass@postgres:5432/job_crawler
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
